label: Protocol Section
description: Section describing the protocol, its principles, and key highlights.
fields:
  - key: id
    type: enum
    label: ID
    options:
      - protocol
  - key: label
    type: string
    label: Label
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      italic: true
      strike: true
      code: true
      link: true
      headings:
        - 1
        - 2
        - 3
      singleLine: true
  - key: paragraphs
    type: array
    label: Paragraphs
    itemType:
      type: enum
      label: Paragraph
      options:
        - Priver is a protocol, not a platform. Like email, like HTTP, like TCP/IP — it doesn't belong to anyone. It can't be bo…
        - The specification is public. The code is open. The network is distributed.
  - key: callout
    type: object
    label: Callout
    fields:
      - key: quote
        type: enum
        label: Quote
        options:
          - If **Jetlio** disappeared tomorrow, Priver would continue. Other developers would build clients. Other operators would r…
      - key: punchline
        type: enum
        label: Punchline
        options:
          - That's the point.
      - key: cards
        type: array
        label: Cards
        itemType:
          type: object
          label: Card
          fields:
            - key: label
              type: string
              label: Label
            - key: value
              type: enum
              label: Value
              options:
                - Public
                - Open
                - Distributed
          preview:
            title:
              - key: label
            description:
              - key: value
preview:
  title:
    - key: heading
    - key: label
  description:
    - key: paragraphs
