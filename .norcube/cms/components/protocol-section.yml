label: Protocol Section
description: Section highlighting the open protocol and its properties.
fields:
  - key: id
    type: enum
    label: ID
    options:
      - protocol
  - key: label
    type: enum
    label: Label
    options:
      - Open protocol
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      italic: true
      singleLine: true
  - key: paragraphs
    type: array
    label: Paragraphs
    itemType:
      type: enum
      label: Paragraph
      options:
        - Priver is a protocol, not a platform. Like email, like HTTP, like TCP/IP — it doesn't belong to anyone. It can't be bo…
        - The specification is public. The code is open. The network is distributed.
  - key: callout
    type: object
    label: Callout
    fields:
      - key: quote
        type: markdown
        label: Quote
        options:
          bold: true
          italic: true
      - key: punchline
        type: enum
        label: Punchline
        options:
          - That's the point.
      - key: cards
        type: array
        label: Cards
        itemType:
          type: object
          label: Card
          fields:
            - key: label
              type: enum
              label: Label
              options:
                - Spec
                - Code
                - Network
            - key: value
              type: enum
              label: Value
              options:
                - Public
                - Open
                - Distributed
          preview:
            title:
              - key: label
            description:
              - key: value
            image: []
preview:
  title:
    - key: heading
  description:
    - key: paragraphs
  image: []
