label: Protocol Section
description: Section highlighting protocol principles and callouts.
fields:
  - key: id
    type: enum
    label: ID
    options:
      - protocol
  - key: label
    type: string
    label: Label
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      italic: true
      singleLine: true
  - key: paragraphs
    type: array
    label: Paragraphs
    itemType:
      type: markdown
      options:
        bold: true
        italic: true
        link: true
  - key: callout
    type: object
    label: Callout
    fields:
      - key: quote
        type: markdown
        label: Quote
        options:
          bold: true
          italic: true
          link: true
      - key: punchline
        type: enum
        label: Punchline
        options:
          - That's the point.
      - key: cards
        type: array
        label: Cards
        itemType:
          type: object
          label: Card
          fields:
            - key: label
              type: string
              label: Label
            - key: value
              type: enum
              label: Value
              options:
                - Public
                - Open
                - Distributed
          preview:
            title:
              - key: label
            description:
              - key: value
            image: []
preview:
  title:
    - key: heading
    - key: label
  description:
    - key: paragraphs
  image: []
