label: Article Cards Grid
description: A grid of article cards with heading, description, and closer text.
fields:
  - key: background
    type: string
    label: Background
  - key: cards
    type: array
    label: Cards
    itemType:
      type: object
      label: Card
      fields:
        - key: description
          type: string
          label: Description
        - key: source_href
          type: url
          label: Source Href
        - key: source_text
          type: string
          label: Source Text
        - key: title
          type: string
          label: Title
      preview:
        title:
          - key: title
        description:
          - key: description
  - key: closer
    type: markdown
    label: Closer
  - key: description
    type: markdown
    label: Description
  - key: heading
    type: markdown
    label: Heading
  - key: id
    type: string
    label: ID
  - key: label
    type: string
    label: Label
preview:
  title:
    - key: heading
    - key: label
  description:
    - key: description
    - key: closer
