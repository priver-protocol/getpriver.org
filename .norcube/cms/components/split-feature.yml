label: Split Feature
description: A feature section with heading, description, bullets, callout, and layout options.
fields:
  - key: id
    type: string
    label: ID
    description: Unique identifier for this feature.
  - key: label
    type: string
    label: Label
    description: Short label for the feature.
  - key: heading
    type: markdown
    label: Heading
    description: Main heading for the feature.
    options:
      bold: true
      italic: true
      singleLine: true
  - key: description
    type: markdown
    label: Description
    description: Detailed description of the feature.
    options:
      bold: true
      italic: true
      link: true
  - key: bullets
    type: array
    label: Bullets
    description: List of supporting bullet points.
    itemType:
      type: object
      label: Bullet
      fields:
        - key: icon
          type: string
          label: Icon
          description: Icon name or identifier.
        - key: text
          type: markdown
          label: Text
          description: Bullet point text.
          options:
            bold: true
            italic: true
            link: true
      preview:
        title:
          - key: icon
        description:
          - key: text
  - key: callout
    type: object
    label: Callout
    description: Highlighted quote or callout.
    fields:
      - key: quote
        type: markdown
        label: Quote
        description: Callout quote text.
        options:
          bold: true
          italic: true
          link: true
  - key: background
    type: string
    label: Background
    description: Background color or style.
  - key: reverse
    type: boolean
    label: Reverse
    description: Reverse the layout.
preview:
  title:
    - key: heading
    - key: label
  description:
    - key: description
  image: []
