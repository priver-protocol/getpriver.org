label: Hero
description: A prominent section with badge, heading, description, buttons, and stats.
fields:
  - key: badge
    type: object
    label: Badge
    fields:
      - key: text
        type: enum
        label: Text
        options:
          - An open protocol — not a product
          - Priver for journalists
          - Deep dive — back to Priver home
      - key: pulse
        type: boolean
        label: Pulse
      - key: href
        type: enum
        label: Href
        options:
          - /
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      singleLine: true
  - key: description
    type: enum
    label: Description
    options:
      - A messenger with no one in the middle. No accounts. No phone numbers. No servers. No company that can read, scan, or han…
      - Every major messenger has a server. Every server has an owner. Every owner can be subpoenaed, hacked, or compelled. Priv…
      - How every mainstream messenger leaks your data, why the EU's Chat Control breaks them all, and what Priver's architectur…
  - key: buttons
    type: array
    label: Buttons
    itemType:
      type: object
      label: Button
      fields:
        - key: text
          type: enum
          label: Text
          options:
            - Get Priver
            - See how it works
            - Read the threat model
            - Start with the problem
            - Jump to comparison
        - key: href
          type: enum
          label: Href
          options:
            - '#download'
            - '#solution'
            - /threat-model/
            - '#problem'
            - '#comparison'
        - key: variant
          type: enum
          label: Variant
          options:
            - primary
            - secondary
        - key: size
          type: enum
          label: Size
          options:
            - md
        - key: icon_right
          type: enum
          label: Icon Right
          options:
            - lucide:arrow-right
            - lucide:arrow-down
      preview:
        title:
          - key: text
  - key: stats
    type: array
    label: Stats
    itemType:
      type: object
      label: Stat
      fields:
        - key: label
          type: enum
          label: Label
          options:
            - Servers
            - Phone numbers
            - Transport
            - License
            - Metadata stored
        - key: value
          type: enum
          label: Value
          options:
            - "0"
            - None
            - Tor
            - Open
            - Zero
        - key: sublabel
          type: enum
          label: Sublabel
          options:
            - Nothing to subpoena
            - Nothing to leak
            - Nothing to trace
            - Nothing to hide
            - Nothing to seize
      preview:
        title:
          - key: label
        description:
          - key: sublabel
preview:
  title:
    - key: heading
  description:
    - key: description
