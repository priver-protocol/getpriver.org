label: Hero
description: A hero section with badge, heading, description, buttons, and stats.
fields:
  - key: badge
    type: object
    label: Badge
    fields:
      - key: text
        type: string
        label: Text
      - key: pulse
        type: boolean
        label: Pulse
      - key: href
        type: enum
        label: Href
        options:
          - /
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      italic: true
      singleLine: true
  - key: description
    type: markdown
    label: Description
    options:
      bold: true
      italic: true
  - key: buttons
    type: array
    label: Buttons
    itemType:
      type: object
      label: Button
      fields:
        - key: text
          type: string
          label: Text
        - key: href
          type: enum
          label: Href
          options:
            - '#download'
            - '#solution'
            - /threat-model/
            - '#problem'
            - '#comparison'
        - key: variant
          type: enum
          label: Variant
          options:
            - primary
            - secondary
        - key: size
          type: enum
          label: Size
          options:
            - md
        - key: icon_right
          type: enum
          label: Icon Right
          options:
            - lucide:arrow-right
            - lucide:arrow-down
      preview:
        title:
          - key: text
  - key: stats
    type: array
    label: Stats
    itemType:
      type: object
      label: Stat
      fields:
        - key: label
          type: string
          label: Label
        - key: value
          type: enum
          label: Value
          options:
            - "0"
            - None
            - Tor
            - Open
            - Zero
        - key: sublabel
          type: enum
          label: Sublabel
          options:
            - Nothing to subpoena
            - Nothing to leak
            - Nothing to trace
            - Nothing to hide
            - Nothing to seize
      preview:
        title:
          - key: label
        description:
          - key: sublabel
preview:
  title:
    - key: heading
  description:
    - key: description
