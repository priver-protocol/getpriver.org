label: Feature Grid
description: A grid layout for showcasing features with optional headings, descriptions, and cards.
fields:
  - key: id
    type: enum
    label: ID
    options:
      - why
      - solution
      - architecture
  - key: background
    type: enum
    label: Background
    options:
      - zinc-50
  - key: label
    type: enum
    label: Label
    options:
      - Why Priver
      - The solution
      - How it's built
      - Who it's for
      - What this means for your work
  - key: heading
    type: enum
    label: Heading
    options:
      - The messenger that *works when platforms go down, governments crack down, and companies give in.*
      - Priver is built different. *Fundamentally different.*
      - Three layers. *Zero compromise.*
      - Priver is for everyone who has ever **assumed their messages were private.**
      - The freedoms that *matter to journalists.*
  - key: description
    type: enum
    label: Description
    options:
      - Not just for privacy people. For anyone who's ever lost an account, watched a service go dark, or wondered why a messeng…
      - 'Signal proved that end-to-end encryption could be easy. Priver takes the next step: removing the servers, the phone numb…'
  - key: columns
    type: number
    label: Columns
  - key: cards
    type: array
    label: Cards
    itemType:
      type: object
      label: Card
      fields:
        - key: icon
          type: string
          label: Icon
        - key: title
          type: string
          label: Title
        - key: description
          type: string
          label: Description
        - key: variant
          type: enum
          label: Variant
          options:
            - highlight
            - plain
        - key: layer_number
          type: enum
          label: Layer Number
          options:
            - Layer 01
            - Layer 02
            - Layer 03
        - key: layer_subtitle
          type: enum
          label: Layer Subtitle
          options:
            - Specification
            - Reference client
            - Federated bridge
        - key: href
          type: enum
          label: Href
          options:
            - /for/journalists/
      preview:
        title:
          - key: title
        description:
          - key: description
        image:
          - key: icon
  - key: bullets
    type: array
    label: Bullets
    itemType:
      type: object
      label: Bullet
      fields:
        - key: text
          type: enum
          label: Text
          options:
            - There is no server to subpoena.
            - There is no company that holds your data.
            - There is no one to comply — because there is no one in between.
  - key: subheading
    type: enum
    label: Subheading
    options:
      - How it works
  - key: closing
    type: object
    label: Closing
    fields:
      - key: primary
        type: enum
        label: Primary
        options:
          - And everyone in between.
      - key: secondary
        type: enum
        label: Secondary
        options:
          - Privacy isn't a feature for the paranoid. It's a right for everyone.
preview:
  title:
    - key: heading
    - key: label
  description:
    - key: description
  image: []
