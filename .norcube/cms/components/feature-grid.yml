label: Feature Grid
description: A grid of features with headings, descriptions, and cards.
fields:
  - key: id
    type: enum
    label: ID
    options:
      - why
      - solution
      - architecture
  - key: background
    type: enum
    label: Background
    options:
      - zinc-50
  - key: label
    type: string
    label: Label
  - key: heading
    type: markdown
    label: Heading
    options:
      bold: true
      italic: true
      singleLine: true
  - key: description
    type: markdown
    label: Description
    options:
      bold: true
      italic: true
  - key: columns
    type: number
    label: Columns
  - key: cards
    type: array
    label: Cards
    itemType:
      type: object
      label: Card
      fields:
        - key: icon
          type: string
          label: Icon
        - key: title
          type: markdown
          label: Title
          options:
            bold: true
            italic: true
            singleLine: true
        - key: description
          type: markdown
          label: Description
          options:
            bold: true
            italic: true
        - key: variant
          type: enum
          label: Variant
          options:
            - highlight
            - plain
        - key: layer_number
          type: enum
          label: Layer Number
          options:
            - Layer 01
            - Layer 02
            - Layer 03
        - key: layer_subtitle
          type: string
          label: Layer Subtitle
        - key: href
          type: enum
          label: Href
          options:
            - /for/journalists/
      preview:
        title:
          - key: title
        description:
          - key: description
        image: []
  - key: bullets
    type: array
    label: Bullets
    itemType:
      type: object
      label: Bullet
      fields:
        - key: text
          type: textarea
          label: Text
  - key: subheading
    type: enum
    label: Subheading
    options:
      - How it works
  - key: closing
    type: object
    label: Closing
    fields:
      - key: primary
        type: enum
        label: Primary
        options:
          - And everyone in between.
      - key: secondary
        type: markdown
        label: Secondary
        options:
          bold: true
          italic: true
preview:
  title:
    - key: label
    - key: heading
  description:
    - key: description
  image: []
