# Norcube CMS site configuration.
# https://norcube.com/cms — generated to match the existing
# src/content/pages/*.md frontmatter so the editor can load
# index.md, threat-model.md and for/journalists.md without any
# additional setup.
#
# Edit me freely. Norcube reads this file on every editor open;
# saves from the CMS UI commit changes back here.

pagesDir: src/content/pages

collections:
  pages:
    label: Pages
    description: >-
      Marketing-style landing pages composed of section blocks.
      Each file under `pagesDir` is one page; nested folders show
      up as folders in the editor's tree view.
    hasBody: false
    fields:
      title:
        type: string
        label: Title
        description: Shown in the browser tab and as the H1.
        required: true
        default: ""
      seo:
        type: object
        label: SEO
        description: Search engine + social metadata.
        nullable: true
        preview:
          title: [{ key: title }, "SEO"]
          description: [{ key: description }]
          image: [{ key: og_image }]
        fields:
          title:
            type: string
            label: Title
            description: Used in <title> and og:title. Keep under ~60 chars.
            default: ""
          description:
            type: textarea
            label: Description
            description: Meta description. Keep under ~160 chars.
            rows: 3
            default: ""
          canonical:
            type: url
            label: Canonical URL
            default: ""
          og_image:
            type: image
            label: Social share image
            description: og:image / twitter:image. 1200×630 recommended.
            accept: image/*
          og_type:
            type: enum
            label: og:type
            options: ["website", "article", "profile"]
            default: website
          twitter_card:
            type: enum
            label: Twitter card
            options: ["summary", "summary_large_image"]
            default: summary
      blocks:
        type: blocks
        label: Sections
        description: Page content, block by block.
        components:
          - hero
          - feature-grid
          - cta-banner
          - protocol-section
          - download-cta
          - article-cards-grid
          - split-feature
          - scenario-cards
          - chat-control-callout
          - comparison-table

    components:
      # ---------- hero ----------
      hero:
        label: Hero
        description: Top-of-page banner with badge, headline, CTAs and a stats row.
        preview:
          title: [{ key: heading }, "Hero"]
          description: [{ key: description }]
          badges: [["Hero"]]
        fields:
          badge:
            type: object
            label: Badge
            description: Chip rendered above the heading.
            nullable: true
            preview:
              title: [{ key: text }, "Badge"]
            fields:
              text:
                type: string
                label: Text
                required: true
                default: ""
              href:
                type: string
                label: Link target
                description: Optional. If set, badge becomes a link.
                default: ""
              pulse:
                type: boolean
                label: Pulse indicator
                default: false
          heading:
            type: markdown
            label: Heading
            description: One line. Bold + italic allowed; lists/headings/links are off.
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          buttons:
            type: array
            label: Buttons
            description: Up to two CTAs.
            minItems: 0
            maxItems: 2
            itemType:
              type: object
              label: Button
              preview:
                title: [{ key: text }, "Button"]
                description: [{ key: href }]
              fields:
                text:
                  type: string
                  label: Label
                  required: true
                  default: ""
                href:
                  type: string
                  label: URL
                  required: true
                  default: ""
                variant:
                  type: enum
                  label: Variant
                  options: ["primary", "secondary", "ghost"]
                  default: primary
                size:
                  type: enum
                  label: Size
                  options: ["sm", "md", "lg"]
                  default: md
                icon_left:
                  type: string
                  label: Left icon
                  description: e.g. `lucide:arrow-right` or `simple-icons:apple`.
                  default: ""
                icon_right:
                  type: string
                  label: Right icon
                  default: ""
          stats:
            type: array
            label: Stats row
            description: Compact numbers under the buttons.
            itemType:
              type: object
              label: Stat
              preview:
                title: [{ key: label }, "Stat"]
                description: [{ key: value }]
              fields:
                label:
                  type: string
                  label: Label
                  required: true
                  default: ""
                value:
                  type: string
                  label: Value
                  required: true
                  default: ""
                sublabel:
                  type: string
                  label: Sublabel
                  default: ""

      # ---------- feature-grid ----------
      feature-grid:
        label: Feature grid
        description: Grid of feature cards (icon + title + body). Optionally with bullets and a closing block.
        preview:
          title: [{ key: heading }, "Feature grid"]
          description: [{ key: description }]
        fields:
          id:
            type: string
            label: Anchor id
            description: HTML id for in-page navigation (#why, #solution, …).
            default: ""
          background:
            type: enum
            label: Background
            options: ["", "zinc-50", "white"]
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            description: One line. Bold + italic only; other shortcuts are dead.
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          bullets:
            type: array
            label: Lead-in bullets
            itemType:
              type: object
              label: Bullet
              preview:
                title: [{ key: text }, "Bullet"]
              fields:
                text:
                  type: string
                  label: Text
                  required: true
                  default: ""
          subheading:
            type: string
            label: Sub-heading
            default: ""
          columns:
            type: number
            label: Columns
            default: 3
          cards:
            type: array
            label: Cards
            itemType:
              type: object
              label: Card
              preview:
                title: [{ key: title }, "Card"]
                description: [{ key: description }]
              fields:
                icon:
                  type: string
                  label: Icon
                  description: e.g. `lucide:lock`.
                  default: ""
                title:
                  type: markdown
                  label: Title
                  required: true
                  default: ""
                  options:
                    bold: true
                    italic: true
                    singleLine: true
                description:
                  type: markdown
                  label: Description
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
                href:
                  type: string
                  label: Link target
                  default: ""
                variant:
                  type: enum
                  label: Variant
                  options: ["", "highlight", "plain"]
                  default: ""
                layer_number:
                  type: string
                  label: Layer number
                  description: For architecture-style grids (Layer 01, Layer 02 …).
                  default: ""
                layer_subtitle:
                  type: string
                  label: Layer subtitle
                  default: ""
          closing:
            type: object
            label: Closing block
            nullable: true
            fields:
              primary:
                type: string
                label: Primary line
                default: ""
              secondary:
                type: string
                label: Secondary line
                default: ""

      # ---------- cta-banner ----------
      cta-banner:
        label: CTA banner
        description: Single call-to-action block (heading + paragraph + one button).
        preview:
          title: [{ key: heading }, "CTA"]
          description: [{ key: description }]
        fields:
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          button:
            type: object
            label: Button
            fields:
              text:
                type: string
                label: Label
                required: true
                default: ""
              href:
                type: string
                label: URL
                required: true
                default: ""
              variant:
                type: enum
                label: Variant
                options: ["primary", "secondary", "ghost"]
                default: primary
              size:
                type: enum
                label: Size
                options: ["sm", "md", "lg"]
                default: md
              icon_right:
                type: string
                label: Right icon
                default: ""

      # ---------- protocol-section ----------
      protocol-section:
        label: Protocol section
        description: Long-form section with paragraphs and a callout card.
        preview:
          title: [{ key: heading }, "Protocol section"]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          paragraphs:
            type: array
            label: Paragraphs
            itemType:
              type: markdown
              label: Paragraph
              default: ""
              options:
                bold: true
                italic: true
                link: true
          callout:
            type: object
            label: Callout
            nullable: true
            fields:
              quote:
                type: markdown
                label: Quote
                default: ""
                options:
                  bold: true
                  italic: true
                  link: true
              punchline:
                type: markdown
                label: Punchline
                default: ""
                options:
                  bold: true
                  italic: true
                  singleLine: true
              cards:
                type: array
                label: Mini cards
                itemType:
                  type: object
                  label: Mini card
                  preview:
                    title: [{ key: label }, "Mini card"]
                    description: [{ key: value }]
                  fields:
                    label:
                      type: string
                      label: Label
                      required: true
                      default: ""
                    value:
                      type: string
                      label: Value
                      required: true
                      default: ""

      # ---------- download-cta ----------
      download-cta:
        label: Download CTA
        description: Platform downloads (iOS / Android / Desktop / Source).
        preview:
          title: [{ key: heading }, "Download"]
          description: [{ key: description }]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          buttons:
            type: array
            label: Buttons
            itemType:
              type: object
              label: Button
              preview:
                title: [{ key: text }, "Button"]
                description: [{ key: href }]
              fields:
                variant:
                  type: enum
                  label: Variant
                  options: ["platform", "header"]
                  default: platform
                text:
                  type: string
                  label: Label
                  required: true
                  default: ""
                href:
                  type: string
                  label: URL
                  required: true
                  default: ""
                platform_label:
                  type: string
                  label: Platform label
                  description: e.g. "Download for".
                  default: ""
                icon_left:
                  type: string
                  label: Left icon
                  default: ""
                icon_right:
                  type: string
                  label: Right icon
                  default: ""
                external:
                  type: boolean
                  label: External link
                  default: false
          footer_note:
            type: string
            label: Footer note
            default: ""

      # ---------- article-cards-grid ----------
      article-cards-grid:
        label: Article cards grid
        description: Cards with attributable sources (link + source label).
        preview:
          title: [{ key: heading }, "Article cards"]
          description: [{ key: description }]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          background:
            type: enum
            label: Background
            options: ["", "zinc-50", "white"]
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          cards:
            type: array
            label: Cards
            itemType:
              type: object
              label: Card
              preview:
                title: [{ key: title }, "Card"]
                description: [{ key: description }]
              fields:
                title:
                  type: markdown
                  label: Title
                  required: true
                  default: ""
                  options:
                    bold: true
                    italic: true
                    singleLine: true
                description:
                  type: markdown
                  label: Description
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
                source_text:
                  type: string
                  label: Source label
                  description: 'e.g. "Source: ACLU →".'
                  default: ""
                source_href:
                  type: url
                  label: Source URL
                  default: ""

      # ---------- split-feature ----------
      split-feature:
        label: Split feature
        description: Two-column section — heading + description on one side, bulletted points and an optional callout on the other.
        preview:
          title: [{ key: heading }, "Split feature"]
          description: [{ key: description }]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          bullets:
            type: array
            label: Bullets
            itemType:
              type: object
              label: Bullet
              preview:
                title: [{ key: text }, "Bullet"]
              fields:
                icon:
                  type: string
                  label: Icon
                  description: e.g. `lucide:phone`.
                  default: ""
                text:
                  type: markdown
                  label: Text
                  required: true
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
          callout:
            type: object
            label: Callout
            nullable: true
            fields:
              quote:
                type: markdown
                label: Quote
                default: ""
                options:
                  bold: true
                  italic: true
                  link: true

      # ---------- chat-control-callout ----------
      chat-control-callout:
        label: Chat Control callout
        description: Themed callout block — paragraphs + bullets + quoted source cards + status footer.
        preview:
          title: [{ key: heading }, "Chat Control callout"]
          description: [{ key: closer }]
        fields:
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          paragraphs:
            type: array
            label: Paragraphs
            itemType:
              type: markdown
              label: Paragraph
              default: ""
              options:
                bold: true
                italic: true
                link: true
          bullets:
            type: array
            label: Bullets
            itemType:
              type: markdown
              label: Bullet
              default: ""
              options:
                bold: true
                italic: true
                link: true
          quote_cards:
            type: array
            label: Quote cards
            itemType:
              type: object
              label: Quote card
              preview:
                title: [{ key: source }, "Quote"]
                description: [{ key: body }]
              fields:
                body:
                  type: html
                  label: Body
                  description: Inline HTML allowed (the priver content uses <span> for emphasis).
                  required: true
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
                source:
                  type: string
                  label: Source label
                  default: ""
                href:
                  type: url
                  label: Source URL
                  default: ""
          status:
            type: object
            label: Status footer
            nullable: true
            fields:
              text:
                type: markdown
                label: Status text
                default: ""
                options:
                  bold: true
                  italic: true
                  link: true
              link_text:
                type: string
                label: Link label
                default: ""
              href:
                type: url
                label: Link URL
                default: ""
          closer:
            type: markdown
            label: Closer
            description: Last paragraph below the status.
            default: ""
            options:
              bold: true
              italic: true
              link: true

      # ---------- comparison-table ----------
      comparison-table:
        label: Comparison table
        description: Capability matrix — rows are features, columns are products, each cell is a verdict.
        preview:
          title: [{ key: heading }, "Comparison table"]
          description: [{ key: legend }]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          columns:
            type: array
            label: Columns
            description: Product names shown across the header row.
            itemType:
              type: string
              label: Column
              default: ""
          highlight_last:
            type: boolean
            label: Highlight last column
            description: Visual emphasis on the rightmost column (e.g. our own product).
            default: false
          rows:
            type: array
            label: Rows
            itemType:
              type: object
              label: Row
              preview:
                title: [{ key: capability }, "Row"]
              fields:
                capability:
                  type: string
                  label: Capability
                  required: true
                  default: ""
                verdicts:
                  type: array
                  label: Verdicts
                  description: One entry per column, in the same order.
                  itemType:
                    type: enum
                    label: Verdict
                    options: ["yes", "no", "partial"]
                    default: "no"
          legend:
            type: markdown
            label: Legend
            description: Optional footnote under the table.
            default: ""
            options:
              bold: true
              italic: true
              link: true

      # ---------- scenario-cards ----------
      scenario-cards:
        label: Scenario cards
        description: '"Before / after" cards — what happens without Priver vs. with it.'
        preview:
          title: [{ key: heading }, "Scenarios"]
          description: [{ key: description }]
        fields:
          id:
            type: string
            label: Anchor id
            default: ""
          background:
            type: enum
            label: Background
            options: ["", "zinc-50", "white"]
            default: ""
          label:
            type: string
            label: Eyebrow
            default: ""
          heading:
            type: markdown
            label: Heading
            required: true
            default: ""
            options:
              bold: true
              italic: true
              singleLine: true
          description:
            type: markdown
            label: Description
            default: ""
            options:
              bold: true
              italic: true
              link: true
          cards:
            type: array
            label: Cards
            itemType:
              type: object
              label: Scenario
              preview:
                title: [{ key: scenario }, "Scenario"]
                description: [{ key: without }]
              fields:
                icon:
                  type: string
                  label: Icon
                  default: ""
                scenario:
                  type: markdown
                  label: Scenario
                  required: true
                  default: ""
                  options:
                    bold: true
                    italic: true
                    singleLine: true
                without:
                  type: markdown
                  label: Without Priver
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
                with_priver:
                  type: markdown
                  label: With Priver
                  default: ""
                  options:
                    bold: true
                    italic: true
                    link: true
